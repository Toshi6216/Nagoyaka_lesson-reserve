{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <div class="password-reset-box shadow-lg text-center">
        <h2>メールを送りました！</h2>
        <div class="my-4">
            <i class="bi bi-envelope-check text-success" style="font-size: 3rem;"></i>
        </div>
        <p>
            入力したメールアドレスあてに、<br>
            パスワードを かきかえるための<br>
            特別なリンクを 送りました。
        </p>
        <p class="small text-muted mt-3 bg-light p-2 rounded">
            ※メールが届かないときは、<br>
            「迷惑メール」フォルダを<br>
            確認してみてください。
        </p>
        <div class="mt-4 border-top pt-3">
            <a href="{% url 'account_login' %}" class="btn btn-outline-secondary w-100">ログイン画面にもどる</a>
        </div>
    </div>
</div>
{% endblock %}
