{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <div class="password-reset-box shadow-lg">
        <h2>新しいパスワード</h2>
        <p class="text-center small mb-4">
            新しいパスワードを 2回入力してください。
        </p>

        <form method="POST" action="{{ action_url }}">
            {% csrf_token %}
            {{ form.as_p }} <button type="submit" class="btn-reset">パスワードを決定する</button>
        </form>
    </div>
</div>
{% endblock %}
