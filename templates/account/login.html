{% extends "account/base_entrance.html" %}

{% block entrance_content %}
<h2 class="fw-bold text-center mb-4">おかえりなさい！</h2>
<p class="text-muted text-center mb-4">ログインして予約を始めましょう</p>

<form class="login" method="POST" action="{% url 'account_login' %}">
  {% csrf_token %}
  
  {% if form.errors %}
    <div class="alert alert-danger small">
      名前かパスワードが違うみたいです。
    </div>
  {% endif %}

  <div class="mb-3">
    <label class="form-label small fw-bold">ユーザー名</label>
    <input type="text" name="login" class="form-control form-control-lg" placeholder="ユーザー名を入力" required>
  </div>

  <div class="mb-4">
    <label class="form-label small fw-bold">パスワード</label>
    <input type="password" name="password" class="form-control form-control-lg" placeholder="パスワードを入力" required>
  </div>

  <div class="d-grid gap-2">
    <button class="btn btn-primary btn-lg shadow-sm" type="submit">ログインする</button>
  </div>
</form>

<hr class="my-4">

<div class="text-center">
    <p class="small text-muted mb-0">アカウントを持っていない方は</p>
    <a href="{% url 'account_signup' %}" class="fw-bold">新規登録はこちら</a>
</div>
<div class="mt-2 text-center">
    <a href="{% url 'account_reset_password' %}" class="small text-muted">
        パスワードを忘れた方はこちら
    </a>
</div>
{% endblock %}
