{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="password-reset-box">
        <h2>パスワードの再設定</h2>
        
        <p>パスワードを わすれてしまいましたか？<br>
        下にメールアドレスを 入力してください。<br>
        新しいパスワードを 作るためのメールを 送ります。</p>

        <form method="POST" action="{% url 'account_reset_password' %}" class="password_reset">
            {% csrf_token %}
            <div>
                <label for="id_email">メールアドレス:</label>
                {{ form.email }}
            </div>
            
            <button type="submit">メールを送る</button>
        </form>
        
        <div class="mt-4 text-center">
            <a href="{% url 'account_login' %}" class="text-secondary small">ログイン画面にもどる</a>
        </div>
    </div>
</div>
{% endblock %}
