{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <div class="password-reset-box shadow-lg text-center">
        <h2>パスワード更新完了！</h2>
        <div class="my-4">
            <i class="bi bi-check-circle-fill text-success" style="font-size: 3rem;"></i>
        </div>
        <p class="fw-bold">
            新しいパスワードに<br>
            書きかえが 終わりました。
        </p>
        <p>
            これからは、今作った<br>
            新しいパスワードで<br>
            ログインしてくださいね。
        </p>
        <div class="mt-4 border-top pt-3">
            <a href="{% url 'account_login' %}" class="btn btn-warning w-100 fw-bold">ログインする</a>
        </div>
    </div>
</div>
{% endblock %}
