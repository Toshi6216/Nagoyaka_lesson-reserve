{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h2 class="mb-4 text-light fw-bold">
        <i class="bi bi-person-check text-info"></i> 新規ユーザー承認待ち
    </h2>

    <div class="glass-container">
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                    <tr>
                        <th>登録日</th>
                        <th>ニックネーム</th>
                        <th>メールアドレス</th>
                        <th class="text-center">操作</th>
                    </tr>
                </thead>
                <tbody>
                    {% for user in users %}
                    <tr>
                        <td>{{ user.date_joined|date:"Y/m/d" }}</td>
                        <td><span class="fw-bold text-dark">{{ user.nickname }}</span></td>
                        <td>{{ user.email }}</td>
                        <td class="text-center">
                            <form method="post" class="d-inline">
                                {% csrf_token %}
                                <input type="hidden" name="user_id" value="{{ user.id }}">
                                <button type="submit" name="action" value="approve" class="btn btn-success btn-sm">
                                    <i class="bi bi-check-circle"></i> 承認
                                </button>
                                <button type="submit" name="action" value="delete" class="btn btn-outline-danger btn-sm" onclick="return confirm('本当に削除しますか？')">
                                    削除
                                </button>
                            </form>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="4" class="text-center p-5">
                            <p class="text-muted mb-0">現在、承認待ちのユーザーはいません。</p>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <div class="text-center mt-4">
        <a href="{% url 'booking:calendar' %}" class="btn btn-outline-light">カレンダーに戻る</a>
    </div>
</div>
{% endblock %}
